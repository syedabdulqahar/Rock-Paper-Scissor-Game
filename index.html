<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissor</title>
</head>
<style>
  body{
    display: flex;
    align-items: center;
    flex-direction: column;
    background-color: rgb(36, 25, 25);
  }
  h1{
    font-size: 50px;
    color: white;
    text-shadow: 0px 0px 10px rgba(231, 221, 221, 0.2);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  .icon-btn{
    
    background-color: rgb(48, 18, 18);
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border:none
  }
  .icon-btn:hover{
    cursor: pointer;
    background-color: rgb(3, 15, 17);
    border: 4px solid white;
  }
  .move-icon{
    width: 50px;
    height: 50px;
  }
  legend{
    color: rgb(48, 253, 30);
    font-family: Arial, Helvetica, sans-serif;
    font-size: 18px;
    
  }
  .icon-div{
    display: flex;
    margin-top: 10px;
    flex-direction: row;
    width: 500px;
    border-radius: 15px;
    background-color: rgb(24, 20, 20);
    height: 150px;
    justify-content: space-around;
    justify-content: center;
    align-items: center;
    gap: 50px;
    
  }
  .Moves-div,.ScoreCard{
    background-color: black;
    width: 500px;
    height: 60px;
    border-radius: 15px;
    margin-top: 20px;
    text-align: center;
    font-size: 20px;
  }
  .Moves-div::placeholder{
    color: wheat;
    font-size: 15px;
  }
  .ScoreCard{
    display: flex;
    align-items: center;
    justify-content: center;
  }.score{
    color: white;
    margin-left: 10px;
    margin-right: 10px;
  }
  .player{
    color: white;
  }
</style>
<body>
  <H1>Rock Paper Scissor</H1>
  <p class="move"></p>
  <legend >Moves :
  <div class="icon-div">
    <button class="icon-btn" onclick="PlayGame('Rock')">
      <img class="move-icon" src="./Rock.png" alt="">
    </button>
    <button class="icon-btn" onclick="PlayGame('Paper')">
      <img class="move-icon" src="./Paper.png" alt="">
    </button>
    <button class="icon-btn" onclick="PlayGame('Scissor')">
      <img class="move-icon" src="./Scissor.png" alt="">
    </button>
    </legend>

  </div>
  <div class="Moves-div" aria-label="Moves"></div>
  <div class="ScoreCard"></div>
  <script>
    let gameMoves = document.querySelector(".Moves-div");
let ScoreCard = document.querySelector(".ScoreCard");
let score = {
  win: 0,
  loss: 0,
  tie: 0,
};
function PlayGame(playerMove) {
  let result = "";
  let ComputerMove = ComputerMoveFunction();
  if (playerMove === "Rock") {
    if (ComputerMove === "Rock") {
      result = "Tie";
    } else if (ComputerMove === "Paper") {
      result = "Loss";
    } else if (ComputerMove === "Scissor") {
      result = "Win";
    }
  } else if (playerMove === "Paper") {
    if (ComputerMove === "Rock") {
      result = "Win";
    } else if (ComputerMove === "Paper") {
      result = "Tie";
    } else if (ComputerMove === "Scissor") {
      result = "Loss";
    }
  } else if (playerMove === "Scissor") {
    if (ComputerMove === "Rock") {
      result = "Loss";
    } else if (ComputerMove === "Paper") {
      result = "Win";
    } else if (ComputerMove === "Scissor") {
      result = "Tie";
    }
  }

  if (result === "Win") {
    score.win += 1;
  } else if (result === "Loss") {
    score.loss += 1;
  } else if (result === "Tie") {
    score.tie += 1;
  }

  ScoreCard.innerHTML = `Wins  = <span class="score "> ${score.win}</span > | Losses = <span class="score ">${score.loss}</span>  | Ties = <span class="score ">${score.tie}</span> `;
  Location.setItem(
    "gameMoves1",
    JSON.stringify(
      (gameMoves.innerHTML = `<span class="player">Your</span> Move : <img class="move-icon" src="./${playerMove}.png" alt="${playerMove}">    <img class="move-icon" src="./${ComputerMove}.png" alt="${ComputerMove}"> : <span class="player">Computer</span> Move`),
    ),
  );

  localStorage.setItem("moves", JSON.stringify(gameMoves.innerHTML));
  // alert(`  wins :  ${score.win} loses : ${score.loss}  ties : ${score.tie}`);
}
JSON.parse(localStorage.getItem("gameMoves1"));

function ComputerMoveFunction() {
  let randomNumber = Math.random();
  let result = "";
  if (randomNumber >= 0 && randomNumber <= 1 / 3) {
    result = "Rock";
  } else if (randomNumber > 1 / 3 && randomNumber <= 2 / 3) {
    result = "Paper";
  } else if (randomNumber > 2 / 3 && randomNumber <= 1) {
    result = "Scissor";
  }
  return result;
}

</script>
</body>

</html>
