<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissor</title>
</head>
<style>
  body{
    display: flex;
    align-items: center;
    flex-direction: column;
    background-color: rgb(36, 25, 25);
  }
  h1{
    font-size: 50px;
    color: white;
    text-shadow: 0px 0px 10px rgba(231, 221, 221, 0.2);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  .icon-btn{
    
    background-color: rgb(48, 18, 18);
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border:none
  }
  .icon-btn:hover{
    cursor: pointer;
    background-color: rgb(3, 15, 17);
    border: 4px solid white;
  }
  .move-icon{
    width: 50px;
    height: 50px;
  }
  legend{
    color: rgb(48, 253, 30);
    font-family: Arial, Helvetica, sans-serif;
    font-size: 18px;
    
  }
  .icon-div{
    display: flex;
    margin-top: 10px;
    flex-direction: row;
    width: 500px;
    border-radius: 15px;
    background-color: rgb(24, 20, 20);
    height: 150px;
    justify-content: space-around;
    justify-content: center;
    align-items: center;
    gap: 50px;
    
  }
  .Moves-div,.ScoreCard{
    background-color: black;
    width: 500px;
    height: 60px;
    border-radius: 15px;
    margin-top: 20px;
    text-align: center;
    font-size: 20px;
  }
  .Moves-div::placeholder{
    color: wheat;
    font-size: 15px;
  }
  .ScoreCard{
    display: flex;
    align-items: center;
    justify-content: center;
  }.score{
    color: white;
    margin-left: 10px;
    margin-right: 10px;
  }
  .player{
    color: white;
  }
</style>
<body>
  <H1>Rock Paper Scissor</H1>
  <p class="move"></p>
  <legend >Moves :
  <div class="icon-div">
    <button class="icon-btn" onclick="PlayGame('Rock')">
      <img class="move-icon" src="./images/Rock.png" alt="">
    </button>
    <button class="icon-btn" onclick="PlayGame('Paper')">
      <img class="move-icon" src="./images/Paper.png" alt="">
    </button>
    <button class="icon-btn" onclick="PlayGame('Scissor')">
      <img class="move-icon" src="./images/Scissor.png" alt="">
    </button>
    </legend>

  </div>
  <div class="Moves-div" aria-label="Moves"></div>
  <div class="ScoreCard"></div>
</body>
<script src="./rock-paper-scissors.js"></script>
</html>
